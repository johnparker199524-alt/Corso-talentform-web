<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player - John Italia</title>
    <style>
      /* --- NAVIGATORE E SFONDO GENERALI --- */
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e1b4b); /* Sfondo sfumato scuro e profondo */
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
      }

      /* --- CONTENITORE CENTRALE --- */
      .page-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        width: 100%;
      }

      /* --- CARD DEL LETTORE VIDEO --- */
      .video-card {
        background: rgba(30, 41, 59, 0.7); /* Effetto vetro semitrasparente */
        backdrop-filter: blur(10px); /* Sfocatura dello sfondo */
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 24px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        width: 100%;
        max-width: 640px; /* Larghezza massima ideale per un player video */
        box-sizing: border-box;
      }

      /* --- INTESTAZIONE / TITOLO --- */
      .video-header {
        text-align: center;
        margin-bottom: 20px;
      }

      .video-header h3 {
        color: #f8fafc;
        margin: 0 0 6px 0;
        font-size: 1.5rem;
        letter-spacing: 0.5px;
        font-weight: 600;
      }

      .video-subtitle {
        color: #94a3b8;
        font-size: 0.9rem;
        margin: 0;
      }

      /* --- IL PLAYER VIDEO (RESPONSIVE) --- */
      .video-wrapper {
        position: relative;
        width: 100%;
        border-radius: 14px;
        overflow: hidden; /* Taglia gli angoli del video per farli arrotondati */
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        background-color: #000000; /* Fondo nero durante il caricamento */
        aspect-ratio: 16 / 9; /* Mantiene le proporzioni cinema moderne */
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Fa sì che il video riempia bene lo spazio senza deformarsi */
        display: block;
        outline: none;
      }
    </style>
  </head>
  <body>

    <div class="page-container">

      <main class="video-card">
        
        <header class="video-header">
          <h3>VIDEO John Italia</h3>
          <p class="video-subtitle">Lezione: Introduzione agli Operatori</p>
        </header>
        
        <div class="video-wrapper">
          <video controls>
            <source src="Introduzione agli Operatori.mp4" type="video/mp4" />
            Il tuo browser non supporta l'elemento video.
          </video>
        </div>
        
      </main>

    </div>

  </body>
</html>
