<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Player</title>
    <style>
      /* --- NAVIGATORE E SFONDO GENERALI --- */
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e1b4b); /* Sfondo sfumato scuro e immersivo */
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
      }

      /* --- CONTENITORE CENTRALE --- */
      /* Gestisce l'incolonnamento verticale del titolo principale e della card */
      .page-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px; /* Spazio tra il titolo e la card */
        width: 100%;
      }

      /* --- TITOLO PRINCIPALE DELLA PAGINA --- */
      .main-title {
        color: #f1f5f9;
        font-size: 1.8rem;
        font-weight: 700;
        margin: 0;
        text-align: center;
        letter-spacing: -0.5px;
        text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
      }

      /* --- CARD LETTORE AUDIO --- */
      .audio-card {
        background: rgba(30, 41, 59, 0.7); /* Effetto vetro semitrasparente */
        backdrop-filter: blur(10px); /* Sfocatura sfondo dietro la card */
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 35px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        text-align: center;
        width: 100%;
        max-width: 360px;
        box-sizing: border-box;
      }

      /* --- DECORAZIONE ICONA VINILE/MUSICA --- */
      .player-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        border-radius: 50%;
        margin: 0 auto 20px auto;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
      }

      .player-icon svg {
        width: 40px;
        height: 40px;
        fill: white;
      }

      /* --- INTESTAZIONE / TITOLO TRACCIA (DENTRO LA CARD) --- */
      .card-header h3 {
        color: #f8fafc;
        margin: 0 0 8px 0;
        font-size: 1.4rem;
        letter-spacing: 0.5px;
        font-weight: 600;
      }

      .track-sub {
        color: #94a3b8;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }

      /* --- CONTROLLI AUDIO --- */
      audio {
        width: 100%;
        border-radius: 30px;
        outline: none;
      }

      /* Tocco di stile per i browser basati su Webkit (Chrome, Edge, Safari) */
      audio::-webkit-media-controls-enclosure {
        background-color: #f1f5f9;
      }
    </style>
  </head>
  <body>

    <div class="page-container">
      
      <header>
        <h1 class="main-title">Audio Player John Italia</h1>
      </header>

      <main class="audio-card">
        
        <div class="player-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
          </svg>
        </div>

        <div class="card-header">
          <h3>Il Nuotatore</h3>
        </div>
        
        <div class="track-sub">File Audio MP3</div>
        
        <audio controls>
          <source src="Il Nuotatore.mp3" type="audio/mp3" />
          Il tuo browser non supporta l'elemento audio.
        </audio>
        
      </main>

    </div>

  </body>
</html>
