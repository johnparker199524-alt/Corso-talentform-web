<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario di Registro</title>
    <style>
        /* --- STILI GENERALI --- */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #509ce7;
            color: #334155;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: #0f172a;
            font-size: 2.2rem;
            margin: 0;
            font-weight: 700;
        }

        /* --- CONTENITORE DEL FORM --- */
        .form-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        /* --- SEZIONI E SEPARATORI --- */
        fieldset {
            border: none; /* Rimosso il vecchio bordo scatolato brutto */
            padding: 0;
            margin: 0;
        }

        legend {
            font-weight: 700;
            color: #1e40af;
            font-size: 1.2rem;
            margin-bottom: 20px;
            padding: 0;
        }

        /* Il nostro separatore personalizzato elegante */
        .separator {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, #e2e8f0, #cbd5e1, #e2e8f0);
            margin: 30px 0;
        }

        /* --- CAMPI DI INPUT --- */
        .form-group {
            margin-bottom: 20px;
        }

        label.field-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            background-color: #f8fafc;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* --- CHECKBOX E RADIO --- */
        .options-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }

        .checkbox-group, .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .inline-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1rem;
            color: #334155;
        }

        .inline-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #3b82f6; /* Colora il pallino/quadratino di blu nei browser moderni */
        }

        /* --- BOTTONE DI INVIO --- */
        .submit-btn {
            width: 100%;
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }

        .submit-btn:hover {
            background-color: #2563eb;
        }

        .submit-btn:active {
            transform: scale(0.98); /* Piccolo effetto pressione al clic */
        }
    </style>
</head>
<body>

    <header>
        <h1>Formulario di Registrazione</h1>
    </header>

    <main class="form-container">
        <form action="#" method="post">
            
            <fieldset>
                <legend>Informazioni Personali</legend>
                
                <div class="form-group">
                    <label for="name" class="field-label">Nome</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email" class="field-label">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password" class="field-label">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
            </fieldset>

            <hr class="separator">

            <fieldset>
                <legend>Informazioni Aggiuntive</legend>
                
                <div class="form-group">
                    <label for="age" class="field-label">Età</label>
                    <input type="number" id="age" name="age" required>
                </div>

                <div class="form-group">
                    <label for="gender" class="field-label">Genere</label>
                    <select id="gender" name="gender" required>
                        <option value="">Seleziona</option>
                        <option value="male">Maschio</option>
                        <option value="female">Femmina</option>
                        <option value="other">Altro</option>
                    </select>
                </div>
            </fieldset>

            <hr class="separator">

            <fieldset>
                <legend>Interessi e Piano</legend>
                
                <span class="options-title">Interessi</span>
                <div class="checkbox-group">
                    <label class="inline-label">
                        <input type="checkbox" name="interests" value="sports"> Sport
                    </label>
                    <label class="inline-label">
                        <input type="checkbox" name="interests" value="music"> Musica
                    </label>
                    <label class="inline-label">
                        <input type="checkbox" name="interests" value="travel"> Viaggi
                    </label>
                </div>

                <span class="options-title">Tipo di Abbonamento</span>
                <div class="radio-group">
                    <label class="inline-label">
                        <input type="radio" name="subscription" value="free" checked> Gratuito
                    </label>
                    <label class="inline-label">
                        <input type="radio" name="subscription" value="premium"> Premium
                    </label>
                </div>
            </fieldset>

            <hr class="separator">

            <button type="submit" class="submit-btn">Crea Account</button>

        </form>
    </main>

</body>
</html>
