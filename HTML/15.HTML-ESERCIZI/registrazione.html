<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>registrati</title>
  </head>
  <body style="text-align: center; background-color: aquamarine;">
    <header>
      <h1>Registrati</h1>
    </header>

    <main style="background-color: brown; text-align: center;">
      <fieldset style="display: flex; justify-content: center;">
        <legend>Dati</legend>
        <form style="display: flex; flex-direction: column; width: 200px; ">
          <label for="nome" class="name" >nome</label>
           <input type="text" class="nome" id="nome" required placeholder="Inserisci il tuo nome">
           
          <label for="cognome" class="name" >cognome</label>
          <input type="text" class="cognome" id="cognome" required placeholder="Inserisci il tuo cognome">

          <label for="email" class="email" >email</label>
          <input type="email" name="email" id="email" placeholder="Inserisci la tua email">

          <label for="password" class="password" >password</label>
          <input type="password" id="password" placeholder="Inserisci la tua password">

          <input type="submit" value="Invia">
        </form>
      </fieldset>
    </main>
  </body>
</html>
