<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio 3 - Interfaccia Professionale</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <header class="main-header">
         <h1>Immagine Centrata</h1>
    </header>

    <main class="main-content">
        <section class="card">
            <h2>Collegamenti Utili</h2>
            <nav class="nav-links">
                <ul>
                    <li><a href="https://google.com" target="_blank" rel="noopener noreferrer">Google</a></li>
                    <li><a href="https://facebook.com" target="_blank" rel="noopener noreferrer">Facebook</a></li>
                    <li><a href="https://talentform.it" target="_blank" rel="noopener noreferrer">Talentform</a></li>
                </ul>
            </nav>
        </section> 

        <section class="card container-allineamento">
            <h2>Struttura Layered</h2>
            <div id="principale">
                <div id="index">Livello Superiore (Z-Index)</div>
            </div>
        </section>

        <section class="card">
            <h2>Effetti di Transizione</h2>
            <div id="transition">Passa il mouse qui</div>
        </section>

        <section class="card">
            <h2>Design Arrotondato</h2>
            <div class="radius-showcase">Contenitore Smussato</div>
        </section>

        <section class="card">
            <h2>Animazioni Fluide</h2>
            <div id="animation">Stato Dinamico</div>
        </section>
    </main>

</body>
</html>
