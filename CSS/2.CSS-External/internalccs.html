<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cssInternal</title>
  </head>
  <style>
    body {
      box-sizing: border-box;
      max-width: 80%;
      margin: 0 auto;
      padding: 20px;
      background-color: rgb(224, 224, 25);
      font-family: "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
      text-align: center;
    }
    h1,
    h2 {
      padding: 5px;
    }
    #para{
        font-size: 50px;
       color: blue
    }
    .graf{
        color: brown;
        font-size: 30px;
    }
    main{
        background-color: aqua;
        padding: 10px;
        margin-bottom: 10px;
    }
    #foot{
      
        box-sizing: border-box;
        padding: 1px;
        font-size: 30px;
        background-color: rgb(24, 231, 166);
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    }
  </style>
  <body>
    <header>
      <h1>Lavoriamo il css internal</h1>
    </header>

    <main>
      <p id="para">questo stile si applica con id</p>
      <p class="graf">questo style con classe</p>
    </main>

    <footer id="foot">
        <p>@footer-2026</p>
    </footer>
  </body>
</html>
