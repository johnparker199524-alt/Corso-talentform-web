<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow</title>
    <style>
        div{
            width:400px;
            height:250px;
            text-align: center;
            box-shadow: 20px 20px 20px orangered;
            text-shadow: -7px 7px 7px rgb(111, 0, 255);
            background-color: aqua;
            margin:100px;
            color: greenyellow;
        }
    </style>
</head>
<body>

    <div class="shadow">
        <h1 id="text-shadow">sono il text shadow</h1>
    </div>
    
</body>
</html>
