<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
</head>
<style>
  #animation{
    width: 1000px;
    height: 300px;
    text-align: center;
    animation: anim 10s;
    background-color: rgb(12, 245, 167);
    margin-left: 10%;
    margin-top: 20%;

  }
       @keyframes anim{
        from{
              background-color:  green;
        }to{
              background-color: brown;
        }
       }
</style>
<body>
  <div id="animation">Animazione Dj JOHN</div>
    
</body>
</html>
